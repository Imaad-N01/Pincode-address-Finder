<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="container">
            <h1>Address Detail</h1>
            <div class="form-group">
                <input type="text" name="pincode" id="pincode" class="pincode" maxlength="6" inputmode="numeric" required>
                <label for="pincode" class="pincode-label">Pincode</label>
                <p id="error"></p>
            </div>
            <div class="form-group">
                <label for="post-office" id="post-office-label">Post Office</label>
                <select name="post-office" id="post-office"></select>
                <div class="form-group">
            </div>
            <div class="form-group">
                <label for="district"id="district-label">District</label>
                <input type="text" id="district" class="pincode" readonly>
            </div>
            <div class="form-group">
                <label for="state"id="state-label">State</label>
                <input type="text" id="state" class="pincode" readonly>
            </div>
            <div class="form-group">
                <label for="country"id="country-label">Country</label>
                <input type="text" id="country" class="pincode" readonly>
            </div>
        </div>
<script src="app.js"></script>
</body>
</html>
